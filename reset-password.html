<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | Smart Petition System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
font-family:'Roboto', sans-serif;
margin:0;
background:#f5f7fa;
}

/* Navbar */
.navbar{
background:#0a58ca;
}
.nav-link{
color:white !important;
font-weight:500;
}
.nav-link:hover{
text-decoration:underline;
}

/* Reset Section */
.reset-section{
background:linear-gradient(135deg,#1e3c72,#2a5298);
min-height:90vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.reset-card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
width:100%;
max-width:450px;
animation:fadeIn 0.8s ease-in-out;
}

.reset-card h3{
font-weight:700;
color:#1e3c72;
}

.btn-custom{
background:#0d6efd;
color:white;
border:none;
border-radius:8px;
padding:12px;
font-weight:600;
transition:0.3s;
}

.btn-custom:hover{
background:#084298;
}

.password-toggle{
position:absolute;
right:15px;
top:38px;
cursor:pointer;
color:#6c757d;
}

.position-relative{
position:relative;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* Footer */
footer{
background:#0a58ca;
color:white;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand text-white fw-bold" href="/index">
<i class="fas fa-clipboard-check me-2"></i>
Smart Petition System
</a>

<div class="ms-auto d-flex gap-3 align-items-center">
    <a class="nav-link text-white" href="/login" id="back-login">Back to Login</a>

    <button onclick="toggleLanguage()" id="langBtn"
        class="btn btn-outline-light btn-sm">
        தமிழ்
    </button>
</div>
</div>
</nav>

<!-- RESET PASSWORD SECTION -->
<section class="reset-section">
<div class="reset-card">
    <div style="display:flex; justify-content:flex-end; margin-bottom:10px;">
    
</div>

<div class="text-center mb-4">
<i class="fas fa-lock fa-3x text-primary mb-3"></i>
<h3 id="rp-title">Reset Your Password</h3>
<p class="text-muted" id="rp-subtitle">Enter your new password below.</p>
</div>

<div id="statusMsg"></div>

<form onsubmit="return handleReset(event)">

<input type="hidden" name="token" value="{{ token }}">

<div class="mb-3 position-relative">
<label class="form-label" id="label-newpass">New Password</label>
<input type="password" name="password" id="newPassword" class="form-control" required>
<i class="fas fa-eye password-toggle" onclick="togglePassword('newPassword', this)"></i>
</div>

<div class="mb-3 position-relative">
<label class="form-label" id="label-confirmpass">Confirm Password</label>
<input type="password" id="confirmPassword" class="form-control" required>
<i class="fas fa-eye password-toggle" onclick="togglePassword('confirmPassword', this)"></i>
</div>

<button type="submit" class="btn btn-custom w-100" id="btn-update">
Update Password
</button>

</form>

</div>
</section>

<!-- FOOTER -->
<footer class="text-center p-3">
© 2026 Smart Petition System | Tamil Nadu
</footer>

<script>
function togglePassword(fieldId, icon){
const field = document.getElementById(fieldId);

if(field.type === "password"){
field.type = "text";
icon.classList.remove("fa-eye");
icon.classList.add("fa-eye-slash");
}else{
field.type = "password";
icon.classList.remove("fa-eye-slash");
icon.classList.add("fa-eye");
}
}


let currentLanguage = "en";

function toggleLanguage() {

    if (currentLanguage === "en") {

        document.getElementById("rp-title").innerText = "கடவுச்சொல்லை மாற்றவும்";
        document.getElementById("rp-subtitle").innerText = "புதிய கடவுச்சொல்லை கீழே உள்ளிடவும்";

        document.getElementById("label-newpass").innerText = "புதிய கடவுச்சொல்";
        document.getElementById("label-confirmpass").innerText = "கடவுச்சொல் உறுதிப்படுத்தவும்";

        document.getElementById("btn-update").innerText = "கடவுச்சொல்லை புதுப்பிக்கவும்";

        // 🔥 ADD HERE (Tamil)
        document.getElementById("back-login").innerText = "← உள்நுழைவு பக்கத்துக்கு திரும்ப";

        document.getElementById("langBtn").innerText = "English";

        currentLanguage = "ta";

    } else {

        document.getElementById("rp-title").innerText = "Reset Your Password";
        document.getElementById("rp-subtitle").innerText = "Enter your new password below.";

        document.getElementById("label-newpass").innerText = "New Password";
        document.getElementById("label-confirmpass").innerText = "Confirm Password";

        document.getElementById("btn-update").innerText = "Update Password";

        // 🔥 ADD HERE (English)
        document.getElementById("back-login").innerText = "← Back to Login";

        document.getElementById("langBtn").innerText = "தமிழ்";

        currentLanguage = "en";
    }
}
function showMsg(text, type) {
    document.getElementById("statusMsg").innerHTML =
        `<div class="alert alert-${type === "success" ? "success" : "danger"}">
            ${text}
        </div>`;
}

function handleReset(event) {
    event.preventDefault();

    let p1 = document.getElementById("newPassword").value;
    let p2 = document.getElementById("confirmPassword").value;

    // ❌ Password mismatch
    if (p1 !== p2) {
        showMsg("❌ Passwords do not match", "error");
        return false;
    }

    let token = document.querySelector("input[name='token']").value;

    let fd = new FormData();
    fd.append("token", token);
    fd.append("password", p1);

    showMsg("⏳ Updating password...", "success");

    fetch("/reset-password", {
        method: "POST",
        body: fd
    })
    .then(res => res.json())
    .then(data => {
        if (data.success||data.message) {
            showMsg("✅ Password updated successfully!", "success");
        } else {
            showMsg("❌ " + (data.error || "Failed to update password"), "error");
        }
    })
    .catch(() => {
        showMsg("❌ Server error. Try again.", "error");
    });

    return false;
}
</script>

</body>
</html>
