<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Smart Petition System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
background: linear-gradient(135deg,#1e3c72,#2a5298);
font-family:'Poppins',sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}
.login-container{
max-width:900px;
background:white;
border-radius:18px;
box-shadow:0 8px 24px rgba(0,0,0,0.2);
display:flex;
flex-wrap:wrap;
overflow:hidden;
}
.login-side-bg{
flex:1;
min-width:300px;
background:linear-gradient(135deg,#0d6efd,#0b5ed7);
color:white;
padding:40px;
display:flex;
flex-direction:column;
justify-content:center;
}
.login-form-side{
flex:1;
min-width:300px;
padding:40px;
}
.form-control{
border-radius:8px;
}
.btn-login{
background:#0d6efd;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:8px;
}
.btn-login:hover{
background:#0b5ed7;
}
.password-wrapper{
position:relative;
}
.password-wrapper i{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#666;
}
.link-small{
font-size:14px;
}
</style>
</head>

<body>

<div class="login-container">

<div class="login-side-bg">
<h4 id="left-title"><i class="fas fa-clipboard-check me-2"></i>Smart Petition System</h4>
<p id="left-subtitle">Login to access your dashboard and track petitions securely.</p>
</div>

<div class="login-form-side">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 id="login-title" class="mb-0">Sign In</h3>
    <button type="button" class="btn btn-outline-primary btn-sm" id="langBtn" onclick="toggleLanguage()">தமிழ்</button>
</div>
<div id="statusMsg"></div>
<form onsubmit="return handleLogin(event)">
    {% if msg == "logout" %}
    <div class="alert alert-success text-center">
        ✅ Logged out successfully!
    </div>
    {% endif %}

<!-- Email -->
<div class="mb-3">
<label id="label-email">Email</label>
<input type="email" name="email" id="email" class="form-control" required>
</div>

<!-- Password with Eye -->
<div class="mb-2">
<label id="label-password">Password</label>
<div class="password-wrapper">
<input type="password" name="password" id="password" class="form-control" required>
<i class="fa fa-eye" onclick="togglePassword()"></i>
</div>
</div>

<!-- Forgot Password -->
<div class="text-end mb-3">
<a href="/forgot-password" class="link-small" id="forgot-link">Forgot Password?</a>
</div>

<button class="btn-login" id="btn-login">Login</button>

</form>

<div class="mt-3 text-center link-small">
<a href="/index" id="back-home">← Back to Home</a><br>
<span id="account-text">Don’t have an account?</span> <a href="/register" id="create-account-link">Create Account</a>
</div>

</div>
</div>

<script>
function togglePassword(){
    let pwd = document.getElementById("password");
    pwd.type = (pwd.type === "password") ? "text" : "password";
}

// ---------------- MESSAGE UI ----------------
function showMsg(text, type) {
    document.getElementById("statusMsg").innerHTML =
        `<div class="alert alert-${type === "success" ? "success" : "danger"}">
            ${text}
        </div>`;
}

// ---------------- LOGIN HANDLER ----------------
function handleLogin(event) {
    event.preventDefault();

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let fd = new FormData();
    fd.append("email", email);
    fd.append("password", password);

    showMsg("⏳ Logging in...", "success");

    fetch("/login", {
        method: "POST",
        body: fd
    })
    .then(res => {
        // ✅ if redirect (success login)
        if (res.redirected) {
            window.location.href = res.url;
            return;
        }
        return res.text();
    })
    .then(data => {
        if (!data) return;

        // ❌ show error
        showMsg("❌ " + data, "error");
    })
    .catch(() => {
        showMsg("❌ Server error. Try again.", "error");
    });

    return false;
}

// ---------------- LANGUAGE TOGGLE ----------------
let currentLanguage = "en";

function toggleLanguage() {
    if (currentLanguage === "en") {

        document.getElementById("login-title").innerText = "உள்நுழை";
        document.getElementById("langBtn").innerText = "English";

        document.getElementById("left-title").innerHTML =
            '<i class="fas fa-clipboard-check me-2"></i>ஸ்மார்ட் மனு அமைப்பு';

        document.getElementById("left-subtitle").innerText =
            "உங்கள் டாஷ்போர்டை அணுகவும் மற்றும் மனுக்களை பாதுகாப்பாக கண்காணிக்கவும் உள்நுழைக.";

        document.getElementById("label-email").innerText = "மின்னஞ்சல்";
        document.getElementById("label-password").innerText = "கடவுச்சொல்";

        document.getElementById("forgot-link").innerText = "கடவுச்சொல் மறந்துவிட்டதா?";
        document.getElementById("btn-login").innerText = "உள்நுழை";

        document.getElementById("back-home").innerText = "← முகப்பிற்கு திரும்ப";
        document.getElementById("account-text").innerText = "கணக்கு இல்லையா?";
        document.getElementById("create-account-link").innerText = "கணக்கு உருவாக்கு";

        currentLanguage = "ta";

    } else {

        document.getElementById("login-title").innerText = "Sign In";
        document.getElementById("langBtn").innerText = "தமிழ்";

        document.getElementById("left-title").innerHTML =
            '<i class="fas fa-clipboard-check me-2"></i>Smart Petition System';

        document.getElementById("left-subtitle").innerText =
            "Login to access your dashboard and track petitions securely.";

        document.getElementById("label-email").innerText = "Email";
        document.getElementById("label-password").innerText = "Password";

        document.getElementById("forgot-link").innerText = "Forgot Password?";
        document.getElementById("btn-login").innerText = "Login";

        document.getElementById("back-home").innerText = "← Back to Home";
        document.getElementById("account-text").innerText = "Don’t have an account?";
        document.getElementById("create-account-link").innerText = "Create Account";

        currentLanguage = "en";
    }
}

// ---------------- RESET SUCCESS ALERT ----------------
const params = new URLSearchParams(window.location.search);
if (params.get("reset") === "success") {
    showMsg("✅ Password updated successfully. Please login.", "success");
}
</script>

</body>
</html>
