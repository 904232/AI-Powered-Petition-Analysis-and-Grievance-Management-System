.btn-register:hover{

.department-block{

.otp-section{

<script>
document.addEventListener("DOMContentLoaded", function(){

    let isOtpVerified = false;
    let currentLanguage = "en";

    window.toggleDepartment = function(){
        let type = document.getElementById("user_type").value;
        let dept = document.getElementById("departmentBlock");

        if(type === "dept_officer"){
            dept.style.display = "block";
        } else {
            dept.style.display = "none";
            document.querySelector("select[name='department']").value = "";
        }
    }

    toggleDepartment();

    window.sendOtp = async function() {
        let email = document.getElementById("email").value;

        if(!email){
            alert(currentLanguage === "ta" ? "முதலில் மின்னஞ்சலை உள்ளிடவும்" : "Enter email first");
            return;
        }

        try{
            let formData = new FormData();
            formData.append("email", email);

            await fetch("http://127.0.0.1:8000/send-otp",{
                method:"POST",
                body: formData
            });

            alert(currentLanguage === "ta" ? "OTP அனுப்பப்பட்டது" : "OTP Sent");
            document.getElementById("otpSection").style.display="block";
        } catch(error){
            alert(currentLanguage === "ta" ? "சர்வர் இயங்கவில்லை" : "Server not running");
        }
    }

    window.verifyOtp = async function(){
        let email = document.getElementById("email").value;
        let inputs = document.querySelectorAll(".otp-input");
        let otp="";

        inputs.forEach(input=> otp += input.value);

        document.querySelector("input[name='otp']").value = otp;

        try{
            let formData = new FormData();
            formData.append("email", email);
            formData.append("otp", otp);

            let res = await fetch("http://127.0.0.1:8000/verify-otp",{
                method:"POST",
                body: formData
            });

            let data = await res.json();

            if(data.success){
                alert(currentLanguage === "ta" ? "OTP சரிபார்க்கப்பட்டது ✅" : "OTP Verified ✅");
                isOtpVerified = true;
            }else{
                alert(currentLanguage === "ta" ? "தவறான OTP ❌" : "Invalid OTP ❌");
                isOtpVerified = false;
            }
        } catch(error){
            alert(currentLanguage === "ta" ? "OTP சரிபார்ப்பு தோல்வி" : "Verification failed");
        }
    }

    document.getElementById("registerForm").addEventListener("submit", async function(e){
        e.preventDefault();

        if(!isOtpVerified){
            alert(currentLanguage === "ta" ? "முதலில் OTP சரிபார்க்கவும் ❌" : "Verify OTP first ❌");
            return;
        }

        let role = document.getElementById("user_type").value;
        let dept = document.querySelector("select[name='department']").value;

        if(role === "dept_officer" && !dept){
            alert(currentLanguage === "ta" ? "துறையை தேர்வு செய்யவும் ❌" : "Select department ❌");
            return;
        }

        let formData = new FormData(this);

        try{
            let res = await fetch("http://127.0.0.1:8000/register",{
                method:"POST",
                body: formData
            });

            let data = await res.json();

            if(data.success){
                alert(currentLanguage === "ta" ? "வெற்றிகரமாக பதிவு செய்யப்பட்டது ✅" : "Registered ✅");
                window.location.href="/login";
            }else{
                alert(data.message || (currentLanguage === "ta" ? "பதிவு தோல்வி" : "Registration failed"));
            }
        } catch(error){
            alert(currentLanguage === "ta" ? "சர்வர் பிழை" : "Server error");
        }
    });

    window.togglePassword = function(){
        let pwd=document.getElementById("password");
        pwd.type=(pwd.type==="password")?"text":"password";
    }

    window.checkStrength = function(){
        let pwd=document.getElementById("password").value;
        let text=document.getElementById("strengthText");

        if(pwd.length<6){
            text.innerHTML = currentLanguage === "ta"
                ? "<span style='color:red'>பலவீனமான கடவுச்சொல்</span>"
                : "<span style='color:red'>Weak Password</span>";
        }
        else if(pwd.match(/[A-Z]/)&&pwd.match(/[0-9]/)&&pwd.match(/[@$!%*?&]/)){
            text.innerHTML = currentLanguage === "ta"
                ? "<span style='color:green'>வலுவான கடவுச்சொல்</span>"
                : "<span style='color:green'>Strong Password</span>";
        }
        else{
            text.innerHTML = currentLanguage === "ta"
                ? "<span style='color:orange'>நடுத்தர வலிமை</span>"
                : "<span style='color:orange'>Medium Strength</span>";
        }
    }

            document.getElementById("label-user-type").innerText = "பயனர் வகை";

            document.getElementById("option-petitioner").innerText = "மனுதாரர்";

const inputs = document.querySelectorAll(".otp-input");

inputs.forEach((input, index) => {
    input.addEventListener("input", (e) => {
        if (e.target.value.length === 1) {
            if (index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        }
    });

    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && input.value === "") {
            if (index > 0) {
                inputs[index - 1].focus();
            }
        }
    });
});
