<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Smart Petition System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg,#1e3c72,#2a5298); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; font-family:sans-serif; }
        .box { background:white; border-radius:15px; padding:40px; max-width:480px; width:100%; box-shadow:0 10px 30px rgba(0,0,0,0.3); }
        #statusMsg { min-height:40px; }
    </style>
</head>
<body>
<div class="box">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h3 class="mb-0" id="fp-title">Forgot Password</h3>
        <button type="button" class="btn btn-outline-primary btn-sm" id="langBtn" onclick="toggleLanguage()">தமிழ்</button>
    </div>
    <p class="text-muted mb-4" id="fp-subtitle">Enter your registered email. We'll send you a reset link.</p>
    <div id="statusMsg"></div>
    <form onsubmit="return handleFP(event)">
        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="your@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
    </form>
    <div class="text-center mt-3" style="font-size:14px;">
        <a href="/login" id="back-login">← Back to Login</a>
    </div>
</div>
<script>
    function showMsg(text, type) {
        document.getElementById("statusMsg").innerHTML =
            '<div class="alert alert-' + (type==="success"?"success":"danger") + ' py-2 mb-3">' + text + '</div>';
    }
    function handleFP(event) {
        event.preventDefault();
        var email = document.getElementById("email").value.trim();
        if (!email) { showMsg("⚠️ Please enter your email.", "error"); return false; }
        showMsg("⏳ Sending reset link…", "success");
        var fd = new FormData();
        fd.append("email", email);
        fetch("/forgot-password", { method:"POST", body:fd })
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (d.success) {
                showMsg("✅ Reset link sent! Please check your email.", "success");
            } else {
                showMsg("❌ Failed to send reset link.", "error");
            }
        })
        .catch(function() { showMsg("❌ Connection error. Try again.", "error"); });
        return false;
    }
    let currentLanguage = "en";

function toggleLanguage() {
    if (currentLanguage === "en") {
        document.getElementById("fp-title").innerText = "கடவுச்சொல் மறந்துவிட்டதா";
        document.getElementById("fp-subtitle").innerText = "உங்கள் பதிவு செய்யப்பட்ட மின்னஞ்சலை உள்ளிடுங்கள். நாங்கள் reset link அனுப்புவோம்.";
        document.getElementById("label-email").innerText = "மின்னஞ்சல் முகவரி";
        document.getElementById("btn-reset").innerText = "Reset Link அனுப்பு";
        document.getElementById("back-login").innerText = "← உள்நுழைவு பக்கத்துக்கு திரும்ப";
        document.getElementById("langBtn").innerText = "English";

        currentLanguage = "ta";
    } else {
        document.getElementById("fp-title").innerText = "Forgot Password";
        document.getElementById("fp-subtitle").innerText = "Enter your registered email. We'll send you a reset link.";
        document.getElementById("label-email").innerText = "Email Address";
        document.getElementById("btn-reset").innerText = "Send Reset Link";
        document.getElementById("back-login").innerText = "← Back to Login";
        document.getElementById("langBtn").innerText = "தமிழ்";

        currentLanguage = "en";
    }
}
</script>
</body>
</html>
